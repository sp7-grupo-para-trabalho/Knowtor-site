<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowtor — Login</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body class="login-body">
    <header class="cabecalho">
        <nav class="navegacao" aria-label="Navegação principal">
            <div class="nav-logo">
                <img src="./assets/img/know relogo .png" alt="Logo Knowtor" class="logoNav">
                <span>Know<b>tor</b></span>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a class="aovivo" href="aovivo.html">Ao Vivo</a></li>
            </ul>

            <div class="nav-pesquisa">
                <label for="busca-nav" class="sr-only">Pesquisar cursos</label>
                <img src="./assets/img/lupa.png" alt="" aria-hidden="true" class="lupa">
                <input type="search" id="busca-nav" class="pesquisa" placeholder="Pesquisar...">
            </div>
        </nav>
    </header>

    <main class="login-main" aria-label="Página de login">
        <div class="login-container">
            <figure class="login-logo" aria-hidden="true">
                <img src="./assets/img/logo.png" alt="">
                <figcaption>Know<b>tor</b></figcaption>
            </figure>

            <h1 class="login-titulo">
                FAÇA LOGIN PARA ACESSAR SUA CONTA<br>E CONTINUAR APRENDENDO.
            </h1>

            <form class="login-form" id="login-form" novalidate aria-label="Formulário de login">
                <div class="campo-erro" id="erro-msg" role="alert" hidden></div>

                <label for="email" class="sr-only">E-mail</label>
                <input
                    type="email"
                    id="email"
                    class="login-input"
                    placeholder="EMAIL"
                    autocomplete="email"
                    required
                >

                <label for="senha" class="sr-only">Senha</label>
                <input
                    type="password"
                    id="senha"
                    class="login-input"
                    placeholder="SENHA"
                    autocomplete="current-password"
                    required
                >

                <button type="submit" class="btn-entrar-login">ENTRAR</button>

                <p class="outras-maneiras">OUTRAS MANEIRAS DE ENTRAR</p>

                <button type="button" class="btn-google" aria-label="Entrar com Google">
                    <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>

                <a href="senha.html" class="link-esqueceu">ESQUECEU A SENHA ?</a>
            </form>

            <p class="cadastro-cta">
                AINDA NÃO TEM UMA CONTA ?
                <a href="cadastro.html" class="link-cadastro">CADASTRAR-SE</a>
            </p>
        </div>
    </main>

    <script src="./assets/js/auth.js"></script>
    <script>
        redirectIfLoggedIn();

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const erroEl = document.getElementById('erro-msg');

            if (!email || !senha) {
                erroEl.textContent = 'Preencha o e-mail e a senha.';
                erroEl.hidden = false;
                return;
            }

            erroEl.hidden = true;
            login(email, senha);
            window.location.replace('./index.html');
        });
    </script>
</body>
</html>
