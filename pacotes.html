<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacotes</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="grupoImage">
                <img src="/assets/img/know relogo .png" alt="Logo Knowtor" class="logoNav">
                <span>
                    Know<b>tor</b>
                </span>
            </div>
            <div class="navGrupo">
                <a href="index.html">Inicio</a>
                <a href="cursos.html">Cursos</a>
                <a class="aovivo" href="aovivo.html">Ao Vivo</a>
            </div>
            <div class="grupoPesquisa">
                <img src="/assets/img/lupa.png" alt="Lupa de pesquisa" class="lupa">
                <input type="text" class="pesquisa">
            </div>
        </nav>
    </header>
    <main class="callBack">
        <section>
            <img class="logo" src="/assets/img/logo.png" alt="Logo Knowtor">
            <div>
                <optgroup>Selecione um pacote</optgroup>
                <input type="radio" id="basico" name="plano" value="basico">
                <label for="basico">PACOTE DE 10 HORAS - R$20,00</label><br>
                <input type="radio" id="intermediario" name="plano" value="intermediario">
                <label for="intermediario">PACOTE DE 20 HORAS - R$35,00</label><br>
                <input type="radio" id="c=avancado" name="plano" value="avancado">
                <label for="avancado">PACOTE DE 30 HORAS - R$50,00</label>
            </div>
            <div>
                <optgroup>Selecione a forma de pagamento</optgroup>
                <input type="radio" id="pix" name="pagamento" value="pix">
                <label for="pix">PIX</label><br>
                <input type="radio" id="cartao" name="pagamento" value="cartao">
                <label for="cartao">CARTÃO</label><br>
            </div>
            <button class="botaoFim" onclick="location.href= 'login.html'">
                CONFIRMAR
            </button>
        </section>
    </main>
    <footer>
        <img src="/assets/img/logo.png" alt="Logo Knowtor" class="logo">
        <h2> iluminamos o seu caminho de aprendizagem<br>AULAS TOTALMENTE <b class="aovivo">AO VIVO</b></h2>
        <hr>
    </footer>
</body>
</html>
