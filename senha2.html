<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowtor — Nova Senha</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body class="login-body">
    <header class="cabecalho">
        <nav class="navegacao" aria-label="Navegação principal">
            <div class="nav-logo">
                <img src="./assets/img/know relogo .png" alt="Logo Knowtor" class="logoNav">
                <span>Know<b>tor</b></span>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a class="aovivo" href="aovivo.html">Ao Vivo</a></li>
            </ul>

            <div class="nav-pesquisa">
                <label for="busca-nav" class="sr-only">Pesquisar cursos</label>
                <img src="./assets/img/lupa.png" alt="" aria-hidden="true" class="lupa">
                <input type="search" id="busca-nav" class="pesquisa" placeholder="Pesquisar...">
            </div>
        </nav>
    </header>

    <main class="login-main" aria-label="Recuperação de senha — passo 2">
        <div class="login-container">
            <figure class="login-logo" aria-hidden="true">
                <img src="./assets/img/logo.png" alt="">
                <figcaption>Know<b>tor</b></figcaption>
            </figure>

            <form class="login-form cadastro-form" id="nova-senha-form" novalidate aria-label="Formulário de nova senha">

                <div class="campo-grupo">
                    <label for="nova-senha" class="campo-label">INSIRA SUA NOVA SENHA</label>
                    <input type="password" id="nova-senha" class="login-input" placeholder="NOVA SENHA" autocomplete="new-password">
                </div>

                <div class="campo-grupo">
                    <label for="confirmar-nova-senha" class="campo-label">REPITA A SUA NOVA SENHA</label>
                    <input type="password" id="confirmar-nova-senha" class="login-input" placeholder="NOVA SENHA" autocomplete="new-password">
                </div>

                <button type="submit" class="btn-entrar-login">CONFIRMAR</button>
            </form>
        </div>
    </main>

    <footer class="rodape">
        <div class="rodape-conteudo">
            <figure class="rodape-logo">
                <img src="./assets/img/know relogo .png" alt="Logo Knowtor">
                <figcaption>Know<b>tor</b></figcaption>
            </figure>
            <p class="rodape-slogan">ILUMINANDO O SEU CAMINHO DE APRENDIZAGEM</p>
            <p class="rodape-destaque">AULAS TOTALMENTE <span class="texto-aovivo">AO VIVO</span></p>
        </div>
    </footer>

    <script>
        document.getElementById('nova-senha-form').addEventListener('submit', function (e) {
            e.preventDefault();
            window.location.href = './login.html';
        });
    </script>
</body>
</html>
